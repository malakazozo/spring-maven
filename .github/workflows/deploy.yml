name: Spring Boot CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:

  # ---------- JOB 1 ----------
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and run tests
        run: mvn clean verify

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: springboot-jar
          path: target/*.jar

  # ---------- JOB 2 ----------
  sonarqube-analysis:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: SonarQube Scan
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=springboot-app \
            -Dsonar.host.url=${{ secrets.sonar_host_url }} \
            -Dsonar.login=${{ secrets.sonar_token }}

  # ---------- JOB 3 ----------
  nexus-publish:
    name: Publish JAR to Nexus
    runs-on: ubuntu-latest
    needs: sonarqube-analysis
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Deploy to Nexus
        run: mvn deploy -DskipTests -s settings.xml
        env:
          NEXUS_USER: ${{ secrets.nexus_user }}
          NEXUS_PASSWORD: ${{ secrets.nexus_password }}

  # ---------- JOB 4 ----------
  docker-build-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: nexus-publish
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: springboot-jar
          path: target

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.docker_username }}
          password: ${{ secrets.docker_passwd }}

      - name: Build and push image
        run: |
          docker build -t ${{ secrets.docker_username }}/springboot-app:${{ github.sha }} .
          docker build -t ${{ secrets.docker_username }}/springboot-app:latest .
          docker push ${{ secrets.docker_username }}/springboot-app:${{ github.sha }}
          docker push ${{ secrets.docker_username }}/springboot-app:latest
